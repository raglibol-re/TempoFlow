<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="900" height="380" rx="18" fill="#0a0e16"/>
  <rect x="0" y="0" width="900" height="4" rx="2" fill="url(#top)"/>

  <!-- title -->
  <text x="450" y="48" text-anchor="middle" fill="#eef2f6" font-size="30" font-weight="700">TempoFlow</text>
  <text x="450" y="76" text-anchor="middle" fill="#8a94a3" font-size="14">your attention to ads pays for your creator feed</text>

  <!-- OUT card -->
  <rect x="40" y="150" width="250" height="150" rx="14" fill="#131922" stroke="#232c39"/>
  <text x="165" y="188" text-anchor="middle" fill="#f59e42" font-size="15" font-weight="700">OUT &#8594; creators</text>
  <text x="165" y="234" text-anchor="middle" fill="#f59e42" font-size="36" font-weight="700">$0.0168</text>
  <text x="165" y="270" text-anchor="middle" fill="#f59e42" fill-opacity="0.85" font-size="14" font-weight="600">-$0.0028/s</text>

  <!-- NET (center) -->
  <text x="450" y="166" text-anchor="middle" fill="#8a94a3" font-size="16" font-weight="700">NET</text>
  <text x="450" y="230" text-anchor="middle" fill="#eef2f6" font-size="50" font-weight="800">+$0.0000</text>
  <text x="450" y="264" text-anchor="middle" fill="#8a94a3" font-size="13.5">&#8776; $0.00 &#183; watched, cost nothing</text>

  <!-- IN card -->
  <rect x="610" y="150" width="250" height="150" rx="14" fill="#131922" stroke="#232c39"/>
  <text x="735" y="188" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700">IN &#8592; ads</text>
  <text x="735" y="234" text-anchor="middle" fill="#34d399" font-size="36" font-weight="700">$0.0168</text>
  <text x="735" y="270" text-anchor="middle" fill="#34d399" fill-opacity="0.85" font-size="14" font-weight="600">+$0.0028/s</text>

  <!-- animated flow: money streaming left -> right -->
  <g>
    <circle r="4.5" fill="#f59e42"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="0s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#ed9f3d"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#d6ad41"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#aec24a"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#7ccb66"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="2s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#4dd29a"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="2.5s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#34d399"><animateMotion path="M 175 320 H 725" dur="3.5s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3.5s" begin="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- agent pill -->
  <rect x="312" y="342" width="276" height="32" rx="16" fill="#1a2230" stroke="#2a3543"/>
  <circle cx="350" cy="358" r="5" fill="#8b7cf6"><animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/></circle>
  <text x="366" y="363" fill="#cfd6df" font-size="14" font-weight="700">agent balancing your feed</text>
</svg>
